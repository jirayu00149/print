<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wi-Fi Printer Bridge</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel control-panel" aria-label="Printer controls">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M14 18V8h20v10" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
              <path d="M13 34H9a4 4 0 0 1-4-4v-9a4 4 0 0 1 4-4h30a4 4 0 0 1 4 4v9a4 4 0 0 1-4 4h-4" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
              <path d="M14 28h20v12H14z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
              <circle cx="36" cy="24" r="2.3" fill="currentColor"/>
            </svg>
          </div>
          <div>
            <h1>Wi-Fi Printer Bridge</h1>
            <p id="targetLabel">192.168.10.1:9100</p>
          </div>
          <div class="status-pill" id="statusPill" data-state="idle">
            <span></span>
            <strong>ยังไม่ตรวจ</strong>
          </div>
        </div>

        <form id="settingsForm" class="settings-grid">
          <label>
            IP
            <input id="host" name="host" autocomplete="off" inputmode="numeric" value="192.168.10.1">
          </label>
          <label>
            Port
            <input id="port" name="port" type="number" min="1" max="65535" value="9100">
          </label>
          <label>
            Timeout
            <input id="timeoutMs" name="timeoutMs" type="number" min="500" max="30000" step="500" value="3000">
          </label>
          <label>
            Mode
            <select id="mode" name="mode">
              <option value="escpos">ESC/POS</option>
              <option value="raw">RAW</option>
            </select>
          </label>
        </form>

        <div class="toolbar">
          <button id="saveBtn" type="button" class="secondary" title="บันทึกค่า">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
            บันทึก
          </button>
          <button id="checkBtn" type="button" title="ตรวจการเชื่อมต่อ">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/></svg>
            ตรวจ
          </button>
          <button id="testBtn" type="button" title="พิมพ์หน้าทดสอบ">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
            ทดสอบ
          </button>
        </div>
      </section>

      <section class="panel print-panel" aria-label="Print job">
        <div class="section-head">
          <h2>งานพิมพ์</h2>
          <div class="inline-options">
            <label class="select-wrap">
              จัด
              <select id="align">
                <option value="left">ซ้าย</option>
                <option value="center">กลาง</option>
                <option value="right">ขวา</option>
              </select>
            </label>
            <label class="check-wrap">
              <input id="cut" type="checkbox" checked>
              ตัดกระดาษ
            </label>
          </div>
        </div>

        <textarea id="printText" spellcheck="false">Wi-Fi Printer Test
IP: 192.168.10.1
ขอบคุณครับ</textarea>

        <div class="file-tools">
          <label class="file-picker">
            <span>ไฟล์</span>
            <input id="fileInput" type="file" accept=".txt,.csv,.json,.log,.html,.htm,.xml,.md,.js,.css,.yaml,.yml,.prn,.bin,.raw,.escpos,text/*,application/json">
          </label>
          <p id="fileStatus">ยังไม่ได้เลือกไฟล์</p>
          <div class="file-actions">
            <button id="loadFileBtn" type="button" class="secondary" title="โหลดไฟล์ข้อความเข้า textarea">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15l3 3 3-3"/></svg>
              โหลด
            </button>
            <button id="printFileBtn" type="button" title="พิมพ์ไฟล์ที่เลือก">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
              พิมพ์ไฟล์
            </button>
          </div>
        </div>

        <div class="print-actions">
          <label>
            Feed
            <input id="feedLines" type="number" min="0" max="8" value="4">
          </label>
          <button id="printBtn" type="button" class="primary">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
            พิมพ์
          </button>
        </div>
      </section>

      <section class="panel log-panel" aria-label="Printer log">
        <div class="section-head">
          <h2>Log</h2>
          <button id="clearLogBtn" type="button" class="icon-button" title="ล้าง log">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
          </button>
        </div>
        <ol id="log"></ol>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
